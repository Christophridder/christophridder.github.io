<svg viewBox="0 0 380 240" xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="380" height="240" fill="#fafafa" rx="8"/>

  <!-- Ground fill -->
  <rect x="0" y="198" width="380" height="42" fill="#e2e8f0" rx="0"/>

  <!-- Ground hatch lines -->
  <g stroke="#94a3b8" stroke-width="1" opacity="0.7">
    <line x1="10"  y1="198" x2="0"   y2="213"/><line x1="25"  y1="198" x2="15"  y2="213"/>
    <line x1="40"  y1="198" x2="30"  y2="213"/><line x1="55"  y1="198" x2="45"  y2="213"/>
    <line x1="70"  y1="198" x2="60"  y2="213"/><line x1="85"  y1="198" x2="75"  y2="213"/>
    <line x1="100" y1="198" x2="90"  y2="213"/><line x1="115" y1="198" x2="105" y2="213"/>
    <line x1="130" y1="198" x2="120" y2="213"/><line x1="145" y1="198" x2="135" y2="213"/>
    <line x1="160" y1="198" x2="150" y2="213"/><line x1="175" y1="198" x2="165" y2="213"/>
    <line x1="190" y1="198" x2="180" y2="213"/><line x1="205" y1="198" x2="195" y2="213"/>
    <line x1="220" y1="198" x2="210" y2="213"/><line x1="235" y1="198" x2="225" y2="213"/>
    <line x1="250" y1="198" x2="240" y2="213"/><line x1="265" y1="198" x2="255" y2="213"/>
    <line x1="280" y1="198" x2="270" y2="213"/><line x1="295" y1="198" x2="285" y2="213"/>
    <line x1="310" y1="198" x2="300" y2="213"/><line x1="325" y1="198" x2="315" y2="213"/>
    <line x1="340" y1="198" x2="330" y2="213"/><line x1="355" y1="198" x2="345" y2="213"/>
    <line x1="370" y1="198" x2="360" y2="213"/>
  </g>

  <!-- Ground line -->
  <line x1="0" y1="198" x2="380" y2="198" stroke="#374151" stroke-width="1.5"/>

  <!-- Triangle fill -->
  <!-- A=(60,192)  B=(310,192)  C=(310,62) -->
  <polygon points="60,192 310,192 310,62" fill="#dbeafe" opacity="0.55"/>

  <!-- Base (horizontal) -->
  <line x1="60" y1="192" x2="310" y2="192" stroke="#374151" stroke-width="1.5"/>

  <!-- Hypotenuse (the board = L) -->
  <!-- A=(60,192) to C=(310,62): dx=250, dy=-130, angle=atan(130/250)≈27.5° -->
  <line x1="60" y1="192" x2="310" y2="62" stroke="#1e40af" stroke-width="4" stroke-linecap="round"/>

  <!-- Vertical height (h), dashed red -->
  <line x1="310" y1="62" x2="310" y2="192" stroke="#dc2626" stroke-width="2.5"
        stroke-dasharray="9,5" stroke-linecap="round"/>

  <!-- Right-angle box at B=(310,192) -->
  <path d="M 310,180 L 298,180 L 298,192" fill="none" stroke="#374151" stroke-width="1.5"/>

  <!-- Angle arc at A=(60,192), radius=48 -->
  <!-- angle=atan(130/250)=27.47°  -->
  <!-- Start (horizontal): (108, 192) -->
  <!-- End (on hypotenuse): dir=(250,-130)/|AC|, |AC|=√(62500+16900)=√79400≈281.8 -->
  <!-- unit=(0.887,-0.461), end=(60+48*0.887, 192+48*(-0.461))=(102.6, 169.9) -->
  <path d="M 108,192 A 48,48 0 0,0 102.6,169.9"
        fill="none" stroke="#6366f1" stroke-width="2.2"/>

  <!-- θ label -->
  <text x="115" y="188" font-size="18" fill="#6366f1" font-style="italic">θ</text>

  <!-- L label along hypotenuse (midpoint=(185,127), rotate -27.5°) -->
  <g transform="translate(185,127) rotate(-27.5)">
    <text x="0" y="-13" font-size="20" fill="#1e40af" font-style="italic"
          font-weight="700" text-anchor="middle">L</text>
  </g>

  <!-- h label (right of vertical) -->
  <text x="320" y="132" font-size="20" fill="#dc2626" font-style="italic"
        font-weight="700">h</text>

  <!-- Small block on the board at ~38% along -->
  <!-- 38%: x=60+0.38*250=155, y=192-0.38*130=142.6 -->
  <g transform="translate(155,143) rotate(-27.5)">
    <rect x="-16" y="-22" width="32" height="22" fill="#92400e" stroke="#78350f" stroke-width="1.5" rx="1"/>
    <rect x="-16" y="-22" width="32" height="7" fill="rgba(255,210,120,0.3)"/>
    <line x1="-5" y1="-20" x2="-5" y2="-2"  stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
    <line x1="5"  y1="-20" x2="5"  y2="-2"  stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
  </g>

  <!-- Annotations -->
  <text x="34"  y="188" font-size="11" fill="#64748b">Pivot</text>
  <text x="270" y="52"  font-size="11" fill="#64748b">Løftet</text>
  <text x="270" y="64"  font-size="11" fill="#64748b">ende</text>
  <text x="190" y="228" font-size="11" fill="#94a3b8" text-anchor="middle">bord / gulv</text>

</svg>
