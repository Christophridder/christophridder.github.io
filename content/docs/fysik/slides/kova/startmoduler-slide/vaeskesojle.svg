<svg viewBox="0 0 340 300" xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', system-ui, sans-serif">

  <rect width="340" height="300" fill="#fafafa" rx="6"/>

  <defs>
    <!-- Pil-markører, alle peger langs positiv x-akse, orient=auto roterer -->
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#dc2626"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#1d4ed8"/>
    </marker>
  </defs>

  <!-- Container (åben top, bund ved y=245 = ~82% af 300) -->
  <path d="M55,48 L55,245 L285,245 L285,48"
        fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round"/>

  <!-- Væskefyld -->
  <rect x="56" y="70" width="228" height="174" fill="#bfdbfe" opacity="0.55"/>

  <!-- Vandret overflade -->
  <line x1="56" y1="70" x2="284" y2="70" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Fremhævet søjle (stiplet) -->
  <rect x="140" y="70" width="60" height="174"
        fill="#3b82f6" opacity="0.18"
        stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- h-mål (højre for søjle) -->
  <line x1="206" y1="70"  x2="220" y2="70"  stroke="#374151" stroke-width="1"/>
  <line x1="206" y1="245" x2="220" y2="245" stroke="#374151" stroke-width="1"/>
  <line x1="213" y1="70"  x2="213" y2="245" stroke="#374151" stroke-width="1"/>
  <text x="224" y="162" font-size="17" fill="#374151" font-style="italic"
        dominant-baseline="middle">h</text>

  <!-- A-label inde i søjlen -->
  <text x="170" y="162" font-size="13" fill="#1d4ed8" font-style="italic"
        text-anchor="middle" dominant-baseline="middle">A</text>

  <!-- ===== F_luft (grå, ned, 36px) ===== -->
  <!-- Fra y=22 til y=58 (spids ved overfladen) -->
  <line x1="170" y1="22" x2="170" y2="58"
        stroke="#64748b" stroke-width="2.5"
        marker-end="url(#arr-gray)" stroke-linecap="round"/>
  <text x="108" y="36" font-size="13" fill="#64748b" font-style="italic">F</text>
  <text x="117" y="40" font-size="9"  fill="#64748b">luft</text>

  <!-- ===== F_tyn (rød, ned, 54px) — lidt til venstre i søjlen ===== -->
  <!-- Fra y=128 til y=182 -->
  <line x1="158" y1="122" x2="158" y2="176"
        stroke="#dc2626" stroke-width="2.5"
        marker-end="url(#arr-red)" stroke-linecap="round"/>
  <text x="105" y="152" font-size="13" fill="#dc2626" font-style="italic">F</text>
  <text x="114" y="156" font-size="9"  fill="#dc2626">tyn</text>

  <!-- ===== F_opdrift (blå, op, 90px) — lidt til højre i søjlen ===== -->
  <!-- Fra y=245 (bunden) til y=155 (spids) -->
  <line x1="182" y1="245" x2="182" y2="155"
        stroke="#1d4ed8" stroke-width="2.5"
        marker-end="url(#arr-blue)" stroke-linecap="round"/>
  <text x="190" y="215" font-size="13" fill="#1d4ed8" font-style="italic">F</text>
  <text x="199" y="219" font-size="9"  fill="#1d4ed8">opdrift</text>

  <!-- Ligevægtsbetingelse -->
  <text x="170" y="278" font-size="11" fill="#94a3b8" text-anchor="middle">
    F_opdrift = F_tyn + F_luft
  </text>

</svg>
